<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Loading...</title>
    <style>
        body {
            margin: 0;
            padding: 0;
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            height: 100vh;
            background-color: #ffffff;
            color: #333;
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, Oxygen, Ubuntu, Cantarell, 'Open Sans', 'Helvetica Neue', sans-serif;
            overflow: hidden;
            -webkit-app-region: drag; /* Allow dragging the splash screen */
        }
        .logo {
            width: 120px;
            height: 120px;
            margin-bottom: 20px;
            animation: bounce 2s infinite ease-in-out;
        }
        .loader {
            width: 40px;
            height: 40px;
            border: 4px solid #f3f3f3;
            border-top: 4px solid #18a058; /* Naive UI primary color green */
            border-radius: 50%;
            animation: spin 1s linear infinite;
        }
        .text {
            margin-top: 15px;
            font-size: 14px;
            color: #666;
            font-weight: 500;
        }

        @keyframes spin {
            0% { transform: rotate(0deg); }
            100% { transform: rotate(360deg); }
        }

        @keyframes bounce {
            0%, 100% { transform: translateY(0); }
            50% { transform: translateY(-10px); }
        }
        
        @media (prefers-color-scheme: dark) {
            body {
                background-color: #18181c; /* Naive UI dark bg */
                color: #fff;
            }
            .text {
                color: #aaa;
            }
            .loader {
                border-color: #333;
                border-top-color: #63e2b7; /* Naive UI dark primary */
            }
        }
    </style>
</head>
<body>
    <img src="./images/logo/favicon.png" alt="Logo" class="logo">
    <div class="loader"></div>
    <div class="text">Local Music Player</div>
</body>
</html>
